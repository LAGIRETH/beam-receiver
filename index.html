<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beam Receiver</title>
    <style>
        :root {
            --bg-main: #090d16;
            --bg-card: #111827;
            --border-color: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --accent-blue: #2563eb;
            --accent-emerald: #10b981;
            --accent-rose: #f43f5e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.35rem;
            font-weight: 600;
            margin: 0 0 0.25rem 0;
            text-align: center;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin: 0 0 2rem 0;
            text-align: center;
        }

        .status-box {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .status-text {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .transfer-panel {
            display: none;
            margin-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }

        .file-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .file-name {
            color: var(--text-main);
            font-weight: 500;
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .progress-bar-bg {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            height: 8px;
            width: 100%;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: var(--accent-blue);
            height: 100%;
            width: 0%;
            transition: width 0.1s ease;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Beam Receiver</h1>
        <p class="subtitle">Secure point-to-point payload delivery channel</p>
        
        <div class="status-box">
            <div id="statusIndicator" class="spinner"></div>
            <div id="statusText" class="status-text">Connecting to infrastructure...</div>
        </div>

        <div id="transferPanel" class="transfer-panel">
            <div class="file-info">
                <span id="fileName" class="file-name">Processing asset...</span>
                <span id="transferProgress">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progressBarFill" class="progress-bar-fill"></div>
            </div>
        </div>
    </div>

    <script>
        const statusText = document.getElementById('statusText');
        const statusIndicator = document.getElementById('statusIndicator');
        const transferPanel = document.getElementById('transferPanel');
        const fileNameLabel = document.getElementById('fileName');
        const transferProgressLabel = document.getElementById('transferProgress');
        const progressBarFill = document.getElementById('progressBarFill');

        let metadata = null;
        let receivedBytes = 0;
        let fileChunks = [];

        function uiState(text, mode) {
            statusText.textContent = text;
            if (mode === 'loading') {
                statusIndicator.style.display = 'block';
                statusIndicator.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                statusIndicator.style.borderTopColor = 'var(--accent-blue)';
                statusIndicator.style.animation = 'spin 0.8s linear infinite';
            } else if (mode === 'success') {
                statusIndicator.style.borderColor = 'var(--accent-emerald)';
                statusIndicator.style.animation = 'none';
            } else if (mode === 'error') {
                statusIndicator.style.borderColor = 'var(--accent-rose)';
                statusIndicator.style.animation = 'none';
            }
        }

        async function initReceiver() {
            const urlParams = new URLSearchParams(window.location.search);
            const roomID = urlParams.get('id');
            
            if (!roomID) {
                uiState('Configuration Failure: Missing token credential', 'error');
                return;
            }

            try {
                uiState('Retrieving routing matrices...', 'loading');
                
                // FIXED: Simplified poll argument to reliably pull the cached target metadata
                const response = await fetch(`https://ntfy.sh/beam_${roomID}_offer/raw?poll=1`);
                if (!response.ok) throw new Error('Signaling broker unreachable');
                
                const text = await response.text();
                const b64Offer = text.trim();

                if (!b64Offer) {
                    throw new Error('Connection payload missing or expired on signaling broker');
                }

                const offerSDP = atob(b64Offer);
                uiState('Constructing transport tunnel...', 'loading');

                const pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });

                pc.ondatachannel = (event) => {
                    const dataChannel = event.channel;
                    dataChannel.binaryType = 'arraybuffer';
                    
                    dataChannel.onopen = () => {
                        uiState('Direct connection verified. Linked.', 'success');
                    };

                    dataChannel.onmessage = (e) => {
                        if (typeof e.data === 'string') {
                            metadata = JSON.parse(e.data);
                            fileNameLabel.textContent = metadata.name;
                            transferPanel.style.display = 'block';
                            uiState('Streaming data chunks...', 'loading');
                            return;
                        }

                        fileChunks.push(e.data);
                        receivedBytes += e.data.byteLength;

                        const percent = ((receivedBytes / metadata.size) * 100).toFixed(1);
                        transferProgressLabel.textContent = `${percent}%`;
                        progressBarFill.style.width = `${percent}%`;

                        if (receivedBytes >= metadata.size) {
                            uiState('Transmission complete.', 'success');
                            progressBarFill.style.backgroundColor = 'var(--accent-emerald)';
                            
                            const blob = new Blob(fileChunks, { type: 'application/octet-stream' });
                            const url = URL.createObjectURL(blob);
                            const downloadTrigger = document.createElement('a');
                            downloadTrigger.href = url;
                            downloadTrigger.download = metadata.name;
                            downloadTrigger.click();
                            URL.revokeObjectURL(url);
                        }
                    };
                };

                await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: offerSDP }));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                await new Promise(resolve => {
                    if (pc.iceGatheringState === 'complete') resolve();
                    else {
                        pc.onicegatheringstatechange = () => {
                            if (pc.iceGatheringState === 'complete') resolve();
                        };
                    }
                });

                uiState('Transmitting confirmation parameters...', 'loading');

                const b64Answer = btoa(pc.localDescription.sdp);

                await fetch(`https://ntfy.sh/beam_${roomID}_answer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: b64Answer
                });

                uiState('Awaiting connection verification...', 'loading');

            } catch (err) {
                uiState(err.message, 'error');
            }
        }

        initReceiver();
    </script>
</body>
</html>
